<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basin Air Quality | Live Dashboard</title>
    <link rel="icon" type="image/x-icon" href="/public/images/favicons/gemini-b2.ico">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/public/css/kiosk-portrait.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="kiosk-container">
        <!-- Top Pane: Compact Map -->
        <section class="pane pane-map">
            <div class="map-header">
                <h1><i class="fas fa-wind"></i> Uintah Basin Air Quality</h1>
                <div class="live-badge">
                    <span class="pulse"></span>
                    LIVE
                </div>
            </div>
            <div id="aqi-map" class="map-wrapper"></div>
            <div class="map-legend">
                <span class="legend-item good">Good</span>
                <span class="legend-item moderate">Moderate</span>
                <span class="legend-item sensitive">Sensitive</span>
                <span class="legend-item unhealthy">Unhealthy</span>
            </div>
        </section>

        <!-- Bottom Pane: Stats Dashboard -->
        <section class="pane pane-stats">
            <!-- Primary Metric: AQI -->
            <div class="metric-card metric-aqi" id="card-aqi">
                <div class="metric-icon">
                    <i class="fas fa-lungs"></i>
                </div>
                <div class="metric-body">
                    <div class="metric-label">Peak Basin AQI</div>
                    <div class="metric-value" id="aqi-value">--</div>
                    <div class="metric-status" id="aqi-status">Loading...</div>
                </div>
            </div>

            <!-- Secondary Metrics Grid -->
            <div class="metrics-grid">
                <div class="metric-card metric-temp">
                    <div class="metric-icon">
                        <i class="fas fa-temperature-half"></i>
                    </div>
                    <div class="metric-body">
                        <div class="metric-label">Temperature</div>
                        <div class="metric-value" id="temp-value">--°F</div>
                        <div class="metric-sub" id="temp-range">H: -- / L: --</div>
                    </div>
                </div>

                <div class="metric-card metric-wind">
                    <div class="metric-icon">
                        <i class="fas fa-wind"></i>
                    </div>
                    <div class="metric-body">
                        <div class="metric-label">Wind</div>
                        <div class="metric-value" id="wind-value">-- mph</div>
                        <div class="metric-sub" id="wind-dir">--</div>
                    </div>
                </div>

                <div class="metric-card metric-humidity">
                    <div class="metric-icon">
                        <i class="fas fa-droplet"></i>
                    </div>
                    <div class="metric-body">
                        <div class="metric-label">Humidity</div>
                        <div class="metric-value" id="humidity-value">--%</div>
                        <div class="metric-sub" id="dewpoint">Dew: --°F</div>
                    </div>
                </div>

                <div class="metric-card metric-stations">
                    <div class="metric-icon">
                        <i class="fas fa-tower-broadcast"></i>
                    </div>
                    <div class="metric-body">
                        <div class="metric-label">Active Stations</div>
                        <div class="metric-value" id="stations-value">--</div>
                        <div class="metric-sub">reporting</div>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <footer class="kiosk-footer">
                <div class="footer-left">
                    <i class="fas fa-sync-alt spin" id="refresh-icon"></i>
                    <span>Updated <span id="last-update">--:--</span></span>
                </div>
                <div class="footer-right">
                    <span>USU Bingham Research Center</span>
                    <span class="separator">|</span>
                    <span>basinwx.com</span>
                </div>
            </footer>
        </section>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/public/js/kiosk-portrait.js"></script>
</body>
</html>
